[defaults]
inventory = inventory/production.yml
roles_path = roles
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
result_format = yaml
nocows = True
interpreter_python = auto_silent
# Steady-state default: the prod vault password lives in ansible/.vault-pass
# (gitignored, created by the operator). The ANSIBLE_VAULT_PASSWORD_FILE env var
# overrides this — CI sets it, and the build phase points it at .vault-pass-dev.
vault_password_file = .vault-pass

[ssh_connection]
pipelining = True
