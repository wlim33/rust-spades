name: deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: test + build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --locked

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: pnpm test
        run: pnpm test
        working-directory: web

      - name: pnpm build
        run: pnpm build
        working-directory: web

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: spades-web-${{ github.sha }}
          path: web/dist
          retention-days: 90
          if-no-files-found: error

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web
      - name: e2e
        run: make e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: coverage gate
        run: hooks/coverage-check.sh

  ship:
    name: ship
    needs: [ci, e2e, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wlim33/spades:${{ steps.sha.outputs.short }}
            ghcr.io/wlim33/spades:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Pin host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy compose file + Caddyfile to VPS
        run: |
          scp docker-compose.yml deploy@${{ secrets.DEPLOY_HOST }}:/opt/spades/docker-compose.yml
          scp deploy/Caddyfile    deploy@${{ secrets.DEPLOY_HOST }}:/opt/spades/Caddyfile

      - name: Pull + restart on VPS
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          VPS: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "deploy@${VPS}" bash <<EOF
            set -euo pipefail
            cd /opt/spades
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin
            IMAGE_TAG=${SHORT_SHA} docker compose pull
            IMAGE_TAG=${SHORT_SHA} docker compose up -d --remove-orphans
            for i in \$(seq 1 12); do
              status=\$(docker inspect --format='{{.State.Health.Status}}' spades-server 2>/dev/null || echo unknown)
              if [ "\$status" = "healthy" ]; then exit 0; fi
              sleep 5
            done
            echo "Container did not reach healthy state" >&2
            docker compose logs --tail=100 spades-server >&2
            exit 1
          EOF

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: spades-web-${{ github.sha }}
          path: web/dist

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=spades --branch=main --commit-dirty=true

      - name: Smoke check
        run: |
          curl -fsS --max-time 10 https://app.wlim.dev/ >/dev/null
          curl -fsS --max-time 10 https://spades.wlim.dev/health >/dev/null
