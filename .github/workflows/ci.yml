name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm openapi:check
      - run: pnpm tsc --noEmit -p tsconfig.json
      - run: pnpm lint
      - run: pnpm format:check

  unit-component:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit
      - run: pnpm test:component

  e2e:
    runs-on: ubuntu-latest
    needs: static
    env:
      RUST_SPADES_REPO: wlim/rust-spades
      RUST_SPADES_REF: main
      VITE_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-${{ runner.os }}
      - run: pnpm install --frozen-lockfile

      - name: Check out rust-spades
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RUST_SPADES_REPO }}
          ref: ${{ env.RUST_SPADES_REF }}
          path: rust-spades

      - name: Build rust-spades
        working-directory: rust-spades
        run: cargo build --release -p spades-server

      - name: Start rust-spades
        working-directory: rust-spades
        run: |
          ./target/release/spades-server --port 3000 --db /tmp/spades-ci.sqlite --insecure-cookies --cors-allow-origin http://localhost:5173 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/games >/dev/null 2>&1; then
              echo "spades-server up"
              exit 0
            fi
            sleep 1
          done
          echo "spades-server did not come up"
          exit 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
