services:
  spades-server:
    image: ghcr.io/wlim33/spades:${IMAGE_TAG:?IMAGE_TAG must be set — the deploy passes the commit SHA; refusing to default to :latest}
    container_name: spades-server
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - /var/lib/spades:/data
    env_file:
      - /opt/spades/.env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      # Grace for the new container to take over the WAL SQLite file during a
      # deploy swap: the session store opens games.sqlite via sqlx and migrates
      # (a write) while the game store holds it via rusqlite, so a brief lock on
      # startup is normal. A passing check still flips to healthy immediately, so
      # a clean start (~1.3s) is unaffected — this window only helps a slow swap.
      start_period: 60s
      start_interval: 3s

  caddy:
    image: caddy:2-alpine
    container_name: spades-caddy
    restart: unless-stopped
    depends_on:
      spades-server:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - /opt/spades/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/spades/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
